version: "2"

linters:
  enable:
    - errcheck
    - goheader
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    goheader:
      template: |-
        Copyright (c) 2026 Veld Authors.
        SPDX-License-Identifier: {{ SPDX }}
      values:
        regexp:
          SPDX: "MIT|BUSL-1\\.1"
    errcheck:
      exclude-functions:
        - (net.PacketConn).WriteTo
        - (net.Conn).Write
        - io.ReadFull
        - (io.Closer).Close      # deferred cleanup; callers can't act on close errors
        - os.Remove              # best-effort stale-socket cleanup
        - crypto/rand.Read       # never errors since Go 1.20
        - (*net/http.Server).Serve    # returns ErrServerClosed after graceful shutdown
        - (*net/http.Server).Shutdown # cleanup

  exclusions:
    paths:
      - gen/ # hand-generated proto stubs; linted separately when regenerated
    rules:
      # Test files: allow unhandled errors in test helpers.
      - path: _test\.go
        linters: [errcheck]
