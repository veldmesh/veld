version: "2"

linters:
  enable:
    - errcheck
    - goheader
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    goheader:
      template: |-
        Copyright (c) 2026 Veld Authors.
        SPDX-License-Identifier: {{ SPDX }}
      values:
        regexp:
          SPDX: "MIT|BUSL-1\\.1"
    errcheck:
      # Packet send errors are best-effort and logged elsewhere; hkdf.Read never errors.
      exclude-functions:
        - (net.PacketConn).WriteTo
        - (net.Conn).Write
        - io.ReadFull

  exclusions:
    rules:
      # Test files: allow unhandled errors in test helpers.
      - path: _test\.go
        linters: [errcheck]
